app = "g-ranche"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  ALLOWED_ORIGINS = "https://g-ranche.fly.dev"
  ENVIRONMENT = "production"
  BACKEND_URL = "http://localhost:8000"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
